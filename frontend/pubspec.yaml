name: safenet_ai
description: "SafeNet AI - AI-Powered Digital Safety Assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  dio: ^5.5.0+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  mobile_scanner: ^5.1.1
  google_mlkit_text_recognition: ^0.13.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  lottie: ^3.1.2
  connectivity_plus: ^6.0.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  pdf: ^3.10.8
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/lottie/
